<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Solapur Tourism | Enquiry</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <a href="index.html">Home</a>
        <a href="places.html">Places</a>
        <a href="culture.html">Culture</a>
        <a href="travel.html">Travel Guide</a>
        <a href="food.html">Food</a>
        <a href="enquiry.html">Enquiry</a>
    </nav>
    <header><h1>Tourist Enquiry</h1></header>
    <div class="container">
        <div class="card">
            <form id="touristForm">
                <label for="name">Full Name:</label>
                <input type="text" id="name" required>
                
                <label for="email">Email Address:</label>
                <input type="email" id="email" required>
                
                <label for="interest">Primary Interest:</label>
                <select id="interest">
                    <option value="spirituality">Spirituality & Temples</option>
                    <option value="textiles">Textiles & Chaddars</option>
                    <option value="history">History & Forts</option>
                    <option value="food">Regional Cuisine</option>
                </select>
                
                <label for="message">Your Message:</label>
                <textarea id="message" rows="4"></textarea>
                
                <button type="submit">Submit Enquiry</button>
            </form>
            <div id="status" style="margin-top:1rem; font-weight:bold;"></div>
        </div>
    </div>
    <script src="enquiry.js"></script>
    <footer>© 2026 Solapur Tourism</footer>
</body>
</html>
